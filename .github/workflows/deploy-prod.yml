name: Deploy Prod

# MANUAL production gate. Run from the Actions tab ("Run workflow"),
# type "deploy" to confirm. Vercel and Firebase are handled manually.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm production release'
        required: true
        default: ''

jobs:
  verify-input:
    name: Verify confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Check confirm input
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "deploy" ]; then
            echo "::error::Confirmation failed. Type 'deploy' to proceed."
            exit 1
          fi

  gate:
    needs: verify-input
    uses: ./.github/workflows/ci.yml
