name: Deploy Prod

# MANUAL production deploy. Never triggered automatically. Run from the Actions
# tab ("Run workflow"), type "deploy" to confirm. Gates run first; then the deploy
# jobs wait on the `production` GitHub Environment, which is configured with
# required reviewers — a human must approve before anything ships to prod.
# Web -> Vercel (--prod), backend -> Firebase (rules + indexes + functions) on the
# prod project alias.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm production release'
        required: true
        default: ''

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  verify-input:
    name: Verify confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Check confirm input
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "deploy" ]; then
            echo "::error::Confirmation failed. Type 'deploy' to proceed."
            exit 1
          fi

  gate:
    needs: verify-input
    uses: ./.github/workflows/ci.yml

  deploy-firebase:
    name: Deploy Firebase (prod)
    needs: gate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install functions dependencies
        run: cd functions && npm ci

      - name: Write service account credentials
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa.json" >> "$GITHUB_ENV"

      - name: Deploy rules, indexes & functions to prod
        run: |
          npx firebase-tools@latest deploy \
            --only functions \
            --project prod \
            --non-interactive \
            --force

  deploy-vercel:
    name: Deploy Vercel (production)
    needs: gate
    runs-on: ubuntu-latest
    environment: production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel env (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (prod)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (production)
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "Deployed production build: $URL"
